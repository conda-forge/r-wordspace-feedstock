{% set version = "0.2-9" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-wordspace
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/wordspace_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/wordspace/wordspace_{{ version }}.tar.gz
  sha256: 121efed3eccec88d2f3422553506e3a1f23bd74d3da6143dd9ca8906f9848f5b

build:
  number: 1
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - llvm-openmp                # [osx]
  host:
    - r-base
    - r-mass
    - r-matrix >=1.3.0
    - r-rcpp >=0.11.0
    - r-cluster
    - r-iotools
    - r-sparsesvd
  run:
    - r-base
    - r-mass
    - r-matrix >=1.3.0
    - r-rcpp >=0.11.0
    - r-cluster
    - r-iotools
    - r-sparsesvd
    - llvm-openmp                # [osx]

test:
  commands:
    - $R -e "library('wordspace')"           # [not win]
    - "\"%R%\" -e \"library('wordspace')\""  # [win]

about:
  home: http://wordspace.r-forge.r-project.org/
  license: GPL-3.0-only
  summary: An interactive laboratory for research on distributional semantic models ('DSM', see <https://en.wikipedia.org/wiki/Distributional_semantics> for more information).
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
    - tdido
